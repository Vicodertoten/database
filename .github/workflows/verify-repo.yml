name: verify-repo

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  docs-links:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate active docs links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config .lychee.toml
            --offline
            --no-progress
            README.md
            docs/README.md
            docs/foundation
            docs/runbooks

  runtime-sync-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout database
        uses: actions/checkout@v5

      - name: Checkout runtime-app
        uses: actions/checkout@v5
        with:
          repository: ${{ format('{0}/runtime-app', github.repository_owner) }}
          path: .external/runtime-app
          token: ${{ secrets.CROSS_REPO_READ_TOKEN || github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: .external/runtime-app/pnpm-lock.yaml

      - name: Install runtime-app dependencies
        working-directory: .external/runtime-app
        run: pnpm install --frozen-lockfile

      - name: Verify runtime owner sync drift
        working-directory: .external/runtime-app
        run: pnpm run sync:owner:check -- --database-repo "$GITHUB_WORKSPACE"

  verify-repo:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Apply migrations
        run: python scripts/migrate_database.py --database-url "$DATABASE_URL"

      - name: Verify repository
        run: python scripts/verify_repo.py
